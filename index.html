<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sitemap Generator</title>
</head>
<body>
<script>
fetch('pages.json')
  .then(r => r.json())
  .then(pages => {
    const xml = `<?xml version="1.0" encoding="UTF-8"?>
<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
${pages.map(p => `
  <url>
    <loc>${p.url}</loc>
    <lastmod>${p.lastmod}</lastmod>
  </url>`).join('')}
</urlset>`;

    document.body.innerText = xml;
  });
</script>
</body>
</html>
