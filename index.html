<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>GameLeaf Sitemap Generator</title>
</head>
<body>
  <pre id="output">Generating sitemap…</pre>

  <script>
    const ROOT = "https://www.gameleaf.it/";
    const visited = new Set();
    const queue = [ROOT];
    const lastmodMap = {};

    // Proxy stabile compatibile con Google Sites
    const PROXY = "https://api.codetabs.com/v1/proxy?quest=";

    async function fetchPage(url) {
      try {
        const res = await fetch(PROXY + encodeURIComponent(url));

        const lastmod = res.headers.get("last-modified");
        if (lastmod) {
          lastmodMap[url] = new Date(lastmod).toISOString();
        } else {
          lastmodMap[url] = new Date().toISOString();
        }

        return await res.text();
      } catch (e) {
        console.error("Errore fetch:", url, e);
        return "";
      }
    }

    function extractLinks(html) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, "text/html");

      const anchors = [...doc.querySelectorAll("a")];

      const links = anchors
        .map(a => a.href)
        .filter(h => h.startsWith(ROOT));

      return [...new Set(links)];
    }

    async function crawl() {
      while (queue.length > 0) {
        const url = queue.shift();
        if (visited.has(url)) continue;

        visited.add(url);

        const html = await fetchPage(url);
        const links = extractLinks(html);

        links.forEach(link => {
          if (!visited.has(link)) queue.push(link);
        });
      }
    }

    function buildSitemap(urls) {
      const xml = [
        '<?xml version="1.0" encoding="UTF-8"?>',
        '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">'
      ];

      urls.forEach(u => {
        xml.push(`  <url>
    <loc>${u}</loc>
    <lastmod>${lastmodMap[u]}</lastmod>
  </url>`);
      });

      xml.push("</urlset>");
      return xml.join("\n");
    }

    async function generate() {
      await crawl();
      const urls = Array.from(visited).sort();
      const sitemap = buildSitemap(urls);
      document.body.innerHTML = "<pre>" + sitemap + "</pre>";
    }

    generate();
  </script>
</body>
</html>
